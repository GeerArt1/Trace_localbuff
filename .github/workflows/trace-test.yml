# ══════════════════════════════════════════════
# TRACE — CI Test Workflow
# Runs unit tests (+ E2E when ANTHROPIC_API_KEY available)
# on push and pull_request to main branches.
# ══════════════════════════════════════════════

name: TRACE Tests

on:
  push:
    branches: [ main, master, develop ]
    paths-ignore:
      - '**.md'
      - 'ops/**'
      - 'scripts/**'
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run syntax checks
        run: |
          for f in trace_server.js trace_db.js trace_subscription.js trace_cluster.js src/*.js routes/*.js tests/*.js; do
            if [ -f "$f" ]; then
              echo -n "Checking $f... "
              node -c "$f" && echo "OK" || exit 1
            fi
          done

      - name: Run server core tests
        run: node tests/test_server_core.js

      - name: Run database tests
        run: TRACE_DB_PATH=trace_db_test.sqlite node tests/test_db.js

      - name: Run full suite
        run: node tests/test_all.js

      - name: Install Playwright browsers
        run: npx playwright install firefox --with-deps 2>/dev/null

      - name: Run E2E tests
        run: npx playwright test tests/e2e.e2e.test.js tests/provenance.e2e.test.js
        env:
          ADMIN_SECRET: e2e-test-strong-secret-2024

      - name: Check for uncommitted changes (snapshot test)
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "⚠️  Uncommitted changes detected after tests:"
            git status --short
          else
            echo "✅ Working tree clean"
          fi
